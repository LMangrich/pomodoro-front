name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo "${{ secrets.ENV_FRONTEND }}" > .env.local

      - name: Build Next.js app
        run: npm run build

      - name: Compress files
        run: |
          tar -czf deploy.tar.gz .next .env.local public package.json package-lock.json next.config.ts tsconfig.json tailwind.config.ts postcss.config.mjs

      - name: Copy project files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "deploy.tar.gz"
          target: "/root/pomodoro-front"

      - name: Restart application on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            set -e

            cd /root/pomodoro-front

            pm2 stop pomodoro-front || true

            rm -rf .next public

            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            npm ci --omit=dev

            pm2 restart pomodoro-front || pm2 start npm --name "pomodoro-front" -- start -- --port 3000
            pm2 save
